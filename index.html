<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MM 3D Printing | Beta Store</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
    
    :root {
      --primary: #0f172a;
      --accent: #22c55e;
    }

    body {
      font-family: 'Inter', sans-serif;
      scroll-behavior: smooth;
    }

    body.rtl { direction: rtl; }

    .glass-morphism {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* Uniform 1:1 Aspect Ratio for ALL product displays */
    .square-aspect {
      position: relative;
      width: 100%;
      padding-top: 100%; /* Perfect 1:1 Square */
      overflow: hidden;
      background: #f1f5f9;
    }
    
    .square-aspect img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* High-quality crop/fill */
      transition: transform 0.5s ease;
    }

    .catalog-card:hover img {
      transform: scale(1.05);
    }

    .pack-tag {
      position: absolute;
      top: 12px;
      left: 12px;
      background: #ef4444;
      color: white;
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      z-index: 10;
      border-radius: 6px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    body.rtl .pack-tag {
      left: auto;
      right: 12px;
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 3px solid #ffffff;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .bg-tricolor {
      background: linear-gradient(45deg, #000 33%, #ef4444 33% 66%, #fbbf24 66%);
    }

    /* Custom scrollbar for cart */
    #cart-content-area::-webkit-scrollbar { width: 4px; }
    #cart-content-area::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">

<!-- Floating Top Controls -->
<div class="fixed top-4 left-4 right-4 flex justify-between items-center z-50 pointer-events-none">
  <div class="pointer-events-auto flex gap-2">
      <button onclick="setLanguage('en')" id="btn-en" class="px-4 py-2 rounded-full glass-morphism shadow-sm font-bold text-xs border border-slate-200">EN</button>
      <button onclick="setLanguage('he')" id="btn-he" class="px-4 py-2 rounded-full glass-morphism shadow-sm font-bold text-xs border border-slate-200">עב</button>
  </div>
  
  <div class="pointer-events-auto">
    <button onclick="toggleCart()" class="relative p-4 rounded-full bg-slate-900 text-white shadow-xl active:scale-90 transition-transform">
      <i class="fas fa-shopping-cart"></i>
      <span id="cart-count" class="absolute -top-1 -right-1 bg-green-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-slate-900">0</span>
    </button>
  </div>
</div>

<header class="pt-20 pb-10 text-center container mx-auto px-4">
  <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-white shadow-md flex items-center justify-center overflow-hidden border border-slate-100">
    <img src="https://mmprinting3d.github.io/MM-3D-Printing/images/logo.png" alt="MM 3D Logo" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/100?text=MM'">
  </div>
  <h1 class="text-3xl font-extrabold tracking-tight text-slate-900" id="title-main">MM 3D Printing</h1>
  <p class="text-slate-500 mt-1 text-sm italic" id="slogan">Let's make the impossible possible</p>
</header>

<main class="container mx-auto px-4 pb-20">
  <!-- Catalog View -->
  <div id="view-catalog" class="space-y-12"></div>

  <!-- Product Detail View -->
  <div id="view-product" class="hidden max-w-5xl mx-auto">
    <button onclick="showCatalog()" class="mb-6 flex items-center gap-2 text-slate-500 hover:text-slate-900 font-bold transition-colors">
      <i class="fas fa-arrow-left"></i> <span id="btn-back">Back to Catalog</span>
    </button>
    
    <div id="product-detail-content" class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/50 overflow-hidden border border-slate-100">
      <!-- Injected by JS -->
    </div>
  </div>

  <!-- Contact Form Section -->
  <section class="mt-24 border-t border-slate-200 pt-20 max-w-xl mx-auto">
    <div class="text-center mb-10">
      <h2 class="text-2xl font-bold mb-2" id="contact-title">Contact Us</h2>
      <p class="text-slate-500 text-sm" id="contact-subtitle">Have a question or a custom request?</p>
    </div>
    <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
      <form id="contact-form" class="space-y-4" action="https://formspree.io/f/xwvwobwp" method="POST">
        <input type="text" name="Name" placeholder="Your Name" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:ring-2 focus:ring-green-500" required>
        <input type="email" name="Email" placeholder="Email Address" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:ring-2 focus:ring-green-500" required>
        <textarea name="Message" rows="3" placeholder="Message" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:ring-2 focus:ring-green-500" required></textarea>
        <button type="submit" class="w-full py-4 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 transition active:scale-95 flex items-center justify-center gap-2">
          <span id="btn-send-msg">Send Message</span> <i class="fas fa-paper-plane text-xs"></i>
        </button>
      </form>
    </div>
  </section>
</main>

<!-- Cart Sidebar Overlay -->
<div id="cart-overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] hidden flex justify-end">
  <div class="w-full max-w-md bg-white h-full shadow-2xl flex flex-col animate-in slide-in-from-right duration-300">
    <div class="p-6 border-b border-slate-100 flex justify-between items-center">
      <h2 class="text-lg font-black uppercase tracking-tight" id="cart-title">Your Order</h2>
      <button onclick="toggleCart()" class="text-slate-300 hover:text-slate-900"><i class="fas fa-times text-xl"></i></button>
    </div>
    
    <div id="cart-content-area" class="flex-grow overflow-y-auto">
      <div id="cart-items-list" class="p-6 space-y-4"></div>
      <div id="cart-screen-form" class="hidden p-6 space-y-5">
        <button onclick="switchCartScreen('items')" class="text-xs font-bold text-slate-400 flex items-center gap-1 mb-2">
           <i class="fas fa-chevron-left"></i> Back to Items
        </button>
        <form id="order-form" class="space-y-3">
          <div class="grid grid-cols-2 gap-3">
              <input type="text" name="FirstName" placeholder="First Name" class="w-full p-3 bg-slate-100 rounded-xl text-sm" required>
              <input type="text" name="FamilyName" placeholder="Family Name" class="w-full p-3 bg-slate-100 rounded-xl text-sm" required>
          </div>
          <input type="tel" name="Phone" placeholder="Phone Number" class="w-full p-3 bg-slate-100 rounded-xl text-sm" required>
          <input type="email" name="Email" placeholder="Email Address" class="w-full p-3 bg-slate-100 rounded-xl text-sm" required>
          
          <select name="DeliveryType" id="delivery-select" onchange="updateCartUI()" class="w-full p-3 bg-slate-100 rounded-xl text-sm outline-none">
            <option value="pickup" data-fee="0">Pickup (Jerusalem)</option>
            <option value="harnof" data-fee="15">Har Nof (+₪15)</option>
            <option value="knaf_nesharim" data-fee="20">Kanfei Nesharim (+₪20)</option>
            <option value="bayit_vagan" data-fee="30">Bayit V'Gan (+₪30)</option>
          </select>
          <div id="address-container" class="hidden space-y-3 bg-slate-50 p-4 rounded-xl">
             <input type="text" name="Street" placeholder="Street & No." class="w-full p-3 bg-white rounded-xl text-sm border border-slate-200">
          </div>
        </form>
      </div>
      <div id="cart-screen-success" class="hidden p-10 text-center h-full flex flex-col items-center justify-center">
         <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-2xl mb-4"><i class="fas fa-check"></i></div>
         <h2 class="text-xl font-bold mb-1">Order Sent!</h2>
         <p id="display-order-num" class="text-sm font-mono font-bold text-slate-400 mb-6">MM-ORDER</p>
         <button onclick="location.reload()" class="w-full py-4 bg-slate-900 text-white rounded-xl font-bold">Return Home</button>
      </div>
    </div>
    
    <div id="cart-footer" class="p-6 border-t border-slate-100 bg-white">
      <div class="flex justify-between items-center mb-4">
        <span id="total-label" class="font-bold text-slate-900">Total:</span>
        <span id="cart-total" class="text-xl font-black text-green-600">₪0.00</span>
      </div>
      <button onclick="switchCartScreen('form')" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold disabled:opacity-30" id="btn-checkout-start">
          Continue to Delivery
      </button>
      <button onclick="submitOrder()" id="btn-submit" class="hidden w-full py-4 bg-green-600 text-white rounded-2xl font-bold">
          Send Order
      </button>
    </div>
  </div>
</div>

  en: { back: "Back to Catalog", addToCart: "Add to Cart", pack: "PACK OF" },
  he: { back: "חזרה לקטלוג", addToCart: "הוסף לסל", pack: "מארז של" }
};

function setLanguage(lang) {
  currentLang = lang;
  document.body.className = lang === 'he' ? 'rtl' : '';
  renderCatalog();
}

function renderCatalog() {
  const container = document.getElementById('view-catalog');
  container.innerHTML = '';
  allCategories.forEach(cat => {
    const catProds = products.filter(p => p.cat === cat.id);
    if (catProds.length === 0) return;
    const section = document.createElement('div');
    section.innerHTML = `
      <h2 class="text-xl font-black mb-6 border-b-2 border-slate-100 pb-2 uppercase tracking-tight">
        ${currentLang === 'en' ? cat.en : cat.he}
      </h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
        ${catProds.map(p => `
          <div class="catalog-card group cursor-pointer" onclick="showProduct(${p.id})">
            <div class="square-aspect rounded-[1.5rem] shadow-sm group-hover:shadow-xl transition-all duration-300">
              ${p.packQty ? `<div class="pack-tag">${ui[currentLang].pack} ${p.packQty}</div>` : ''}
              <img src="${BASE_IMG_URL}${encodeURIComponent(p.img)}" alt="${p.nameEn}" onerror="this.src='https://via.placeholder.com/400'">
            </div>
            <div class="mt-4 px-1">
              <h3 class="font-bold text-sm text-slate-800">${currentLang === 'en' ? p.nameEn : p.nameHe}</h3>
              <p class="text-green-600 font-black text-sm mt-1">₪${p.price.toFixed(2)}</p>
            </div>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(section);
  });
}

function showProduct(id) {
  const p = products.find(prod => prod.id === id);
  const detail = document.getElementById('product-detail-content');
  const colorsHtml = availableColors.map(c => `<option value="${c.id}">${currentLang === 'en' ? c.en : c.he}</option>`).join('');
  
  detail.innerHTML = `
    <div class="grid lg:grid-cols-2 items-center">
      <!-- Image Part - Square Aspect Maintained -->
      <div class="square-aspect lg:rounded-r-none">
        ${p.packQty ? `<div class="pack-tag text-xs px-4 py-2">${ui[currentLang].pack} ${p.packQty}</div>` : ''}
        <img src="${BASE_IMG_URL}${encodeURIComponent(p.img)}" alt="${p.nameEn}" onerror="this.src='https://via.placeholder.com/600'">
      </div>
      
      <!-- Content Part - Space out to prevent overlap -->
      <div class="p-8 md:p-12 lg:p-16">
        <span class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 block">${p.cat}</span>
        <h2 class="text-3xl md:text-4xl font-black mb-4 leading-tight">${currentLang === 'en' ? p.nameEn : p.nameHe}</h2>
        <div class="text-3xl text-green-600 font-black mb-10">₪${p.price.toFixed(2)}</div>
        
        <div class="grid grid-cols-2 gap-4 mb-8">
          <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">${currentLang === 'en' ? 'Color' : 'צבע'}</label>
            <div class="flex items-center gap-2 bg-slate-50 rounded-2xl p-3 border border-slate-100">
               <div id="color-preview" class="w-5 h-5 rounded-full border border-slate-200 flex-shrink-0"></div>
               <select id="selected-color" onchange="updateDetailColor()" class="bg-transparent font-bold text-xs outline-none border-none w-full cursor-pointer">
                 ${colorsHtml}
               </select>
            </div>
          </div>
          <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">${currentLang === 'en' ? 'Qty' : 'כמות'}</label>
            <div class="flex items-center justify-between bg-slate-50 rounded-2xl p-3 border border-slate-100">
               <button onclick="adjQty(-1)" class="w-5 text-slate-400"><i class="fas fa-minus text-[10px]"></i></button>
               <input type="number" id="detail-qty" value="1" readonly class="w-8 text-center bg-transparent font-bold text-sm outline-none">
               <button onclick="adjQty(1)" class="w-5 text-slate-400"><i class="fas fa-plus text-[10px]"></i></button>
            </div>
          </div>
        </div>

        <button onclick="addToCart(${p.id})" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-sm uppercase tracking-widest shadow-2xl hover:bg-slate-800 active:scale-95 transition-all">
          ${ui[currentLang].addToCart}
        </button>
      </div>
    </div>
  `;
  
  document.getElementById('view-catalog').classList.add('hidden');
  document.getElementById('view-product').classList.remove('hidden');
  updateDetailColor();
  window.scrollTo(0,0);
}

function updateDetailColor() {
  const sel = document.getElementById('selected-color');
  const prev = document.getElementById('color-preview');
  if(!sel || !prev) return;
  const col = availableColors.find(c => c.id === sel.value);
  prev.style.backgroundColor = col.hex === 'tricolor' ? '' : col.hex;
  prev.className = `w-5 h-5 rounded-full border border-slate-200 flex-shrink-0 ${col.hex === 'tricolor' ? 'bg-tricolor' : ''}`;
}

function adjQty(d) {
  const inp = document.getElementById('detail-qty');
  inp.value = Math.max(1, (parseInt(inp.value)||1) + d);
}

function showCatalog() {
  document.getElementById('view-catalog').classList.remove('hidden');
  document.getElementById('view-product').classList.add('hidden');
}

function toggleCart(open) {
  const overlay = document.getElementById('cart-overlay');
  if(open === true) overlay.classList.remove('hidden');
  else if(open === false) overlay.classList.add('hidden');
  else overlay.classList.toggle('hidden');
}

function updateCartUI() {
  const list = document.getElementById('cart-items-list');
  const totalDisplay = document.getElementById('cart-total');
  const countDisplay = document.getElementById('cart-count');
  const delivery = document.getElementById('delivery-select');
  const fee = parseFloat(delivery.options[delivery.selectedIndex].getAttribute('data-fee')) || 0;
  
  const count = cart.reduce((s,i) => s+i.qty, 0);
  countDisplay.innerText = count;
  document.getElementById('btn-checkout-start').disabled = cart.length === 0;
  document.getElementById('address-container').classList.toggle('hidden', delivery.value === 'pickup');

  if(cart.length === 0) {
    list.innerHTML = `<div class="text-center py-20 text-slate-300 font-bold uppercase tracking-widest text-[10px]">Empty</div>`;
    totalDisplay.innerText = "₪0.00";
    return;
  }

  let subtotal = 0;
  list.innerHTML = cart.map((p, idx) => {
    subtotal += p.price * p.qty;
    return `
      <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100">
        <div class="w-12 h-12 bg-white rounded-lg overflow-hidden flex-shrink-0">
          <img src="${BASE_IMG_URL}${encodeURIComponent(p.img)}" class="w-full h-full object-cover">
        </div>
        <div class="flex-grow">
          <h4 class="font-bold text-[11px] leading-tight">${currentLang==='en'?p.nameEn:p.nameHe}</h4>
          <p class="text-[9px] text-slate-400 mt-0.5">${p.colorName} • ${p.qty}</p>
        </div>
        <button onclick="removeFromCart(${idx})" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash-alt text-[10px]"></i></button>
      </div>
    `;
  }).join('');

  totalDisplay.innerText = `₪${(subtotal + fee).toFixed(2)}`;
}

function addToCart(id) {
  const p = products.find(prod => prod.id === id);
  const colorId = document.getElementById('selected-color').value;
  const qty = parseInt(document.getElementById('detail-qty').value) || 1;
  const colorObj = availableColors.find(c => c.id === colorId);
  
  const existing = cart.find(item => item.id === id && item.selectedColorId === colorId);
  if (existing) existing.qty += qty;
  else cart.push({ ...p, qty, selectedColorId: colorId, colorName: currentLang==='en'?colorObj.en:colorObj.he });
  
  updateCartUI();
  toggleCart(true);
}

function removeFromCart(idx) {
  cart.splice(idx, 1);
  updateCartUI();
}

function switchCartScreen(screen) {
  const isForm = screen === 'form';
  document.getElementById('cart-items-list').classList.toggle('hidden', isForm);
  document.getElementById('cart-screen-form').classList.toggle('hidden', !isForm);
  document.getElementById('btn-checkout-start').classList.toggle('hidden', isForm);
  document.getElementById('btn-submit').classList.toggle('hidden', !isForm);
}

async function submitOrder() {
  const form = document.getElementById('order-form');
  if(!form.checkValidity()) { form.reportValidity(); return; }
  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>`;
  
  // Custom structured data for Formspree
  const formData = new FormData(form);
  const orderDetails = cart.map(i => `${i.nameEn} (${i.colorName}) x${i.qty}`).join(', ');
  formData.append("Order_Details", orderDetails);
  formData.append("Grand_Total", document.getElementById('cart-total').innerText);

  try {
    const response = await fetch(`https://formspree.io/f/xwvwobwp`, {
      method: "POST",
      body: formData,
      headers: { 'Accept': 'application/json' }
    });
    if(response.ok) {
      document.getElementById('cart-screen-form').classList.add('hidden');
      document.getElementById('cart-footer').classList.add('hidden');
      document.getElementById('cart-screen-success').classList.remove('hidden');
      cart = []; updateCartUI();
    } else throw new Error();
  } catch(e) { 
    btn.disabled = false; btn.innerText = "Send Order";
  }
}

// Init
setLanguage('en');
</script>
</body>
</html>
