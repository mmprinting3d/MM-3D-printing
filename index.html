    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
    
    :root {
      --primary: #0f172a;
      --accent: #22c55e;
    }

    body {
      font-family: 'Inter', sans-serif;
      scroll-behavior: smooth;
    }

    body.rtl { direction: rtl; }

    .glass-morphism {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .square-aspect {
      position: relative;
      width: 100%;
      padding-top: 100%;
      overflow: hidden;
      background: #f8fafc;
      border-radius: 1.5rem;
    }
    
    .square-aspect img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .catalog-card:hover img {
      transform: scale(1.05);
    }

    .pack-tag {
      position: absolute;
      top: 12px;
      left: 12px;
      background: #ef4444; 
      color: white;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      z-index: 10;
      border-radius: 6px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transform: rotate(-3deg);
      letter-spacing: 0.05em;
    }

    body.rtl .pack-tag {
      left: auto;
      right: 12px;
      transform: rotate(3deg);
    }

    .control-pill {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 12px;
    }

    .qty-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      transition: color 0.2s;
    }
    .qty-btn:hover { color: #0f172a; }

    #cart-content-area::-webkit-scrollbar { width: 4px; }
    #cart-content-area::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    
    /* Custom Checkbox Styling */
    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 14px;
      color: #475569;
      padding: 12px;
      background: #f1f5f9;
      border-radius: 12px;
      transition: background 0.2s;
    }
    .checkbox-container:hover { background: #e2e8f0; }
    .checkbox-container input { width: 18px; height: 18px; cursor: pointer; accent-color: #22c55e; }
  </style>
</head>

</header>

<main class="container mx-auto px-4 pb-20">

      <i class="fas fa-arrow-left"></i> <span id="btn-back">Back to Catalog</span>
    </button>
    <div id="product-detail-content" class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/50 overflow-hidden border border-slate-100"></div>
  </div>

  <section class="mt-24 border-t border-slate-200 pt-20 max-w-xl mx-auto">
    <div class="text-center mb-10">
      <h2 class="text-2xl font-bold mb-2" id="contact-title">Contact Us</h2>
      <p class="text-slate-500 text-sm" id="contact-subtitle">Have a question or a custom request?</p>
    </div>
    <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">

        <input type="text" name="Name" placeholder="Your Name" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:ring-2 focus:ring-green-500" required>

      </form>
    </div>
  </section>
</main>

const ui = {
  en: { back: "Back to Catalog", addToCart: "Add to Cart", pack: "PACK", color: "SELECT COLOR:", qty: "QTY", wa: "I have WhatsApp" },
  he: { back: "חזרה לקטלוג", addToCart: "הוסף לסל", pack: "מארז", color: "בחר צבע:", qty: "כמות", wa: "יש לי וואטסאפ" }
};

function generateOrderNumber() {
    return `MM-${Math.floor(10000 + Math.random() * 90000)}`;
}

function handleDeliveryChange() {
  const select = document.getElementById('delivery-select');
  const addrSection = document.getElementById('address-section');
  const fields = ['street-field', 'building-field', 'apt-field', 'floor-field'];
  
  if (select.value === 'pickup') {
    addrSection.classList.add('hidden');
    fields.forEach(f => {
      document.getElementById(f).required = false;
      document.getElementById(f).value = '';
    });
  } else {
    addrSection.classList.remove('hidden');
    fields.forEach(f => {
      document.getElementById(f).required = true;
    });
  }
  updateCartUI();
}

function setLanguage(lang) {
  currentLang = lang;
  document.body.className = lang === 'he' ? 'rtl' : '';
  document.getElementById('wa-text').innerText = ui[currentLang].wa;
  renderCatalog();
}

function renderCatalog() {
  const container = document.getElementById('view-catalog');
  container.innerHTML = '';
  allCategories.forEach(cat => {
    const catProds = products.filter(p => p.cat === cat.id);
    if (catProds.length === 0) return;
    const section = document.createElement('div');
    section.innerHTML = `
      <h2 class="text-xl font-black mb-6 border-b-2 border-slate-100 pb-2 uppercase tracking-tight">
        ${currentLang === 'en' ? cat.en : cat.he}
      </h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
        ${catProds.map(p => {
          const badgeHtml = p.packQty ? `<div class="pack-tag">${p.packQty}-${ui[currentLang].pack}</div>` : '';
          return `
          <div class="catalog-card group cursor-pointer" onclick="showProduct(${p.id})">
            <div class="square-aspect shadow-sm group-hover:shadow-xl transition-all duration-300">
              ${badgeHtml}
              <img src="${BASE_IMG_URL}${encodeURIComponent(p.img)}" alt="${p.nameEn}" onerror="this.src='https://via.placeholder.com/400'">
            </div>
            <div class="mt-4 px-1">
              <h3 class="font-bold text-sm text-slate-800">${currentLang === 'en' ? p.nameEn : p.nameHe}</h3>
              <p class="text-green-600 font-black text-sm mt-1">₪${p.priceDisplay}</p>
            </div>
          </div>
        `}).join('')}
      </div>
    `;
    container.appendChild(section);
  });
}

function showProduct(id) {
  const p = products.find(prod => prod.id === id);
  const detail = document.getElementById('product-detail-content');
  const colorsHtml = availableColors.map(c => `<option value="${c.id}">${currentLang === 'en' ? c.en : c.he}</option>`).join('');
  const badgeHtml = p.packQty ? `<div class="pack-tag text-xs px-4 py-2">${p.packQty}-${ui[currentLang].pack}</div>` : '';

  detail.innerHTML = `
    <div class="grid lg:grid-cols-2 items-stretch min-h-[500px]">
      <div class="square-aspect lg:h-full lg:rounded-r-none m-4 md:m-8 lg:m-12">
        ${badgeHtml}
        <img src="${BASE_IMG_URL}${encodeURIComponent(p.img)}" class="rounded-3xl" alt="${p.nameEn}" onerror="this.src='https://via.placeholder.com/600'">
      </div>
      <div class="p-8 md:p-12 lg:p-16 flex flex-col justify-center">
        <span class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 block">${p.cat}</span>
        <h2 class="text-3xl md:text-4xl font-black mb-4 leading-tight">${currentLang === 'en' ? p.nameEn : p.nameHe}</h2>
        <div class="text-3xl text-green-600 font-black mb-10">₪${p.priceDisplay}</div>
        <div class="grid grid-cols-2 gap-4 mb-8">
          <div>
            <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-wider">${ui[currentLang].color}</label>
            <div class="control-pill shadow-sm gap-3">
               <div id="color-preview" class="w-6 h-6 rounded-full border border-slate-200"></div>
               <select id="selected-color" onchange="updateDetailColor()" class="bg-transparent font-bold text-sm outline-none border-none w-full cursor-pointer">
                 ${colorsHtml}
               </select>
            </div>
          </div>
          <div class="w-32">
            <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-wider">${ui[currentLang].qty}</label>
            <div class="control-pill shadow-sm justify-between">
               <button onclick="adjQty(-1)" class="qty-btn"><i class="fas fa-minus text-[10px]"></i></button>
               <input type="number" id="detail-qty" value="1" readonly class="w-8 text-center bg-transparent font-black text-sm">
               <button onclick="adjQty(1)" class="qty-btn"><i class="fas fa-plus text-[10px]"></i></button>
            </div>
          </div>
        </div>
        <button onclick="addToCart(${p.id})" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl hover:bg-slate-800 transition-all flex items-center justify-center gap-3">
          <i class="fas fa-shopping-basket"></i> ${ui[currentLang].addToCart}
        </button>
      </div>
    </div>
  `;
  document.getElementById('view-catalog').classList.add('hidden');
  document.getElementById('view-product').classList.remove('hidden');
  updateDetailColor();
  window.scrollTo(0,0);
}

function updateDetailColor() {
  const sel = document.getElementById('selected-color');
  const prev = document.getElementById('color-preview');
  if(!sel || !prev) return;
  const col = availableColors.find(c => c.id === sel.value);
  prev.style.backgroundColor = col.hex;
}

function adjQty(amt) {
  const input = document.getElementById('detail-qty');
  let val = parseInt(input.value) + amt;
  if(val < 1) val = 1;
  input.value = val;
}

function showCatalog() {
  document.getElementById('view-catalog').classList.remove('hidden');
  document.getElementById('view-product').classList.add('hidden');
}

function toggleCart() {
  const overlay = document.getElementById('cart-overlay');
  overlay.classList.toggle('hidden');
  if(!overlay.classList.contains('hidden')) {
    updateCartUI();
  }
}

function switchCartScreen(screen) {
  if(screen === 'form' && cart.length === 0) return;
  
  if(screen === 'form') {
      currentOrderNumber = generateOrderNumber();
      document.getElementById('hidden-order-number').value = currentOrderNumber;
      document.getElementById('order-form-subject').value = `New Order ${currentOrderNumber} from MM 3D Printing`;
  }

  document.getElementById('cart-items-list').classList.toggle('hidden', screen !== 'items');
  document.getElementById('cart-screen-form').classList.toggle('hidden', screen !== 'form');
  document.getElementById('btn-checkout-start').classList.toggle('hidden', screen !== 'items');
  document.getElementById('btn-submit').classList.toggle('hidden', screen !== 'form');
  updateCartUI();
}

function addToCart(pid) {
  const p = products.find(prod => prod.id === pid);
  const colorId = document.getElementById('selected-color').value;
  const qty = parseInt(document.getElementById('detail-qty').value);
  const color = availableColors.find(c => c.id === colorId);
  cart.push({ ...p, color, qty, cartId: Date.now() });
  updateCartUI();
  toggleCart();
}

function calculateDiscount(totalQty) {
  if (totalQty >= 100) return 0.25;
  if (totalQty >= 50) return 0.20;
  if (totalQty >= 30) return 0.15;
  if (totalQty >= 20) return 0.10;
  return 0;
}

function getNextTierMessage(totalQty) {
  if (totalQty < 20) return `Add ${20 - totalQty} more items for 10% OFF!`;
  if (totalQty < 30) return `Add ${30 - totalQty} more items for 15% OFF!`;
  if (totalQty < 50) return `Add ${50 - totalQty} more items for 20% OFF!`;
  if (totalQty < 100) return `Add ${100 - totalQty} more items for 25% OFF!`;
  return "Maximum bulk discount applied!";
}

function updateCartUI() {
  const list = document.getElementById('cart-items-list');
  const count = document.getElementById('cart-count');
  const subtotalEl = document.getElementById('cart-subtotal');
  const totalEl = document.getElementById('cart-total');
  const discountRow = document.getElementById('discount-row');
  const discountValEl = document.getElementById('cart-discount-val');
  const hiddenSummary = document.getElementById('hidden-order-summary');
  const bulkArea = document.getElementById('bulk-info-area');
  
  const totalItemsQty = cart.reduce((acc, i) => acc + i.qty, 0);
  count.innerText = totalItemsQty;
  
  if(!list.classList.contains('hidden')) {
    list.innerHTML = cart.length ? '' : '<p class="text-center text-slate-400 py-10">Your cart is empty</p>';
  }
  
  let subtotal = 0;
  let summaryText = `ORDER NUMBER: ${currentOrderNumber}\n\nDETAILS:\n`;
  
  cart.forEach(item => {
    const rowPrice = item.priceValue * item.qty;
    subtotal += rowPrice;
    summaryText += `- ${item.nameEn} (Color: ${item.color.en}, Qty: ${item.qty}) -> ₪${rowPrice.toFixed(2)}\n`;
    
    if(!list.classList.contains('hidden')) {
      const div = document.createElement('div');
      div.className = "flex gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100";
      div.innerHTML = `
        <img src="${BASE_IMG_URL}${encodeURIComponent(item.img)}" class="w-16 h-16 rounded-xl object-cover">
        <div class="flex-grow">
          <h4 class="font-bold text-sm">${currentLang === 'en' ? item.nameEn : item.nameHe}</h4>
          <div class="text-[10px] text-slate-400 flex items-center gap-1">
            <div class="w-2 h-2 rounded-full" style="background:${item.color.hex}"></div>
            ${currentLang === 'en' ? item.color.en : item.color.he} | Qty: ${item.qty}
          </div>
          <div class="font-black text-sm mt-1">₪${rowPrice.toFixed(2)}</div>
        </div>
        <button onclick="removeFromCart(${item.cartId})" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
      `;
      list.appendChild(div);
    }
  });
  
  const discPercent = calculateDiscount(totalItemsQty);
  const discAmount = subtotal * discPercent;
  const afterDiscount = subtotal - discAmount;
  
  const deliverySelect = document.getElementById('delivery-select');
  const deliveryFee = deliverySelect ? parseInt(deliverySelect.selectedOptions[0].getAttribute('data-fee')) : 0;
  const finalTotal = afterDiscount + deliveryFee;

  subtotalEl.innerText = `₪${subtotal.toFixed(2)}`;
  if (discAmount > 0) {
    discountRow.classList.remove('hidden');
    discountValEl.innerText = `-₪${discAmount.toFixed(2)} (${(discPercent*100)}%)`;
  } else {
    discountRow.classList.add('hidden');
  }
  totalEl.innerText = `₪${finalTotal.toFixed(2)}`;

  if(cart.length > 0 && !document.getElementById('cart-screen-form').classList.contains('hidden')) {
      bulkArea.innerHTML = `
        <div class="p-3 bg-slate-100 border border-slate-200 rounded-xl text-center">
          <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Order Ref</span>
          <span class="text-lg font-black text-slate-900">#${currentOrderNumber}</span>
        </div>
      `;
  } else if(cart.length > 0) {
    bulkArea.innerHTML = `
      <div class="p-3 bg-blue-50 border border-blue-100 rounded-xl text-[11px] text-blue-700 font-medium">
        <i class="fas fa-info-circle mr-1"></i> ${getNextTierMessage(totalItemsQty)}
      </div>
    `;
  }

  summaryText += `\n------------------\n`;
  summaryText += `Items Subtotal: ₪${subtotal.toFixed(2)}\n`;
  if(discAmount > 0) summaryText += `Bulk Discount (${discPercent*100}%): -₪${discAmount.toFixed(2)}\n`;
  summaryText += `Delivery Choice: ${deliverySelect?.selectedOptions[0].text || 'Pickup'}\n`;
  
  const street = document.getElementById('street-field').value;
  const house = document.getElementById('building-field').value;
  const apt = document.getElementById('apt-field').value;
  const floor = document.getElementById('floor-field').value;
  
  if(street) {
    summaryText += `Address: ${street} ${house}, Apt ${apt}, Floor ${floor}\n`;
  }
  
  const hasWA = document.getElementById('wa-check').checked ? "Yes" : "No";
  summaryText += `Has WhatsApp: ${hasWA}\n`;
  summaryText += `TOTAL ORDER: ₪${finalTotal.toFixed(2)}`;
  
  if(hiddenSummary) hiddenSummary.value = summaryText;
}

function removeFromCart(cartId) {
  cart = cart.filter(i => i.cartId !== cartId);
  updateCartUI();
}

async function submitOrder() {
  const form = document.getElementById('order-form');
  const btn = document.getElementById('btn-submit');
  
  updateCartUI(); 

  if(!form.checkValidity()) {
    form.reportValidity();
    return;
  }

  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

  try {
    const formData = new FormData(form);
    const response = await fetch('https://formspree.io/f/xwvwobwp', {
      method: 'POST',
      body: formData,
      headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
      const modal = document.createElement('div');
      modal.className = "fixed inset-0 flex items-center justify-center bg-black/50 z-[200]";
      modal.innerHTML = `
        <div class="bg-white p-8 rounded-[2.5rem] text-center max-w-sm shadow-2xl mx-4">
          <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-check text-3xl"></i>
          </div>
          <h3 class="text-2xl font-black mb-2">Order Confirmed!</h3>
          <p class="text-slate-400 text-sm mb-4">Your reference number is:</p>
          <div class="bg-slate-50 py-3 rounded-2xl mb-6 border border-slate-100">
            <span class="text-2xl font-black text-slate-900 tracking-tight">#${currentOrderNumber}</span>
          </div>
          <p class="text-slate-500 text-sm mb-8 leading-relaxed">We will contact you shortly to arrange payment and collection.</p>
          <button onclick="location.reload()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold">
            Return to Store
          </button>
        </div>
      `;
      document.body.appendChild(modal);
      cart = [];
    } else {
      throw new Error('Submission failed');
    }
  } catch (error) {
    btn.disabled = false;
    btn.innerHTML = originalText;
  }
}

setLanguage('en');
</script>
</body>
</html>
